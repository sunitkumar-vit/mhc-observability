  namespace: ""
dnsConfig: {}
dnsPolicy: ClusterFirst
env: []
envFrom: []
envWithTpl: []
existingConfigMap: ""
extraContainers: []
extraPorts: []
extraVolumeMounts: []
extraVolumes: []
flush: 1
fullnameOverride: ""
hostAliases: []
hostNetwork: false
hotReload:
