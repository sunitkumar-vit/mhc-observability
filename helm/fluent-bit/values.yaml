COMPUTED VALUES:
affinity: {}
annotations: {}
args:
- --workdir=/fluent-bit/etc
- --config=/fluent-bit/etc/conf/fluent-bit.conf
autoscaling:
  behavior: {}
  customRules: []
  enabled: false
  maxReplicas: 3
  minReplicas: 1
  targetCPUUtilizationPercentage: 75
  vpa:
    annotations: {}
    controlledResources: []
    controlledValues: null
    enabled: false
    maxAllowed: {}
    minAllowed: {}
    recommender: default
    updatePolicy:
      updateMode: Auto
backend:
  type: es
command:
- /fluent-bit/bin/fluent-bit
config:
  customParsers: |
    [PARSER]
        Name docker_no_time
        Format json
        Time_Keep Off
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
  extraFiles:
    inputs.conf: |
      [INPUT]
          Name              tail
          Path              /var/log/containers/*.log
          Parser            cri
          Tag               kube.*
          Refresh_Interval  5
          Mem_Buf_Limit     50MB
          Skip_Long_Lines   On
    filters.conf: |
      [FILTER]
          Name                  kubernetes
          Match                 kube.*
          Kube_Tag_Prefix       kube.var.log.containers.
          Merge_Log             On
          Merge_Log_Key         log_processed
          Keep_Log              On
          K8S-Logging.Parser    On
          K8S-Logging.Exclude   Off
          Labels                On
          Annotations           On
    rewrite-tag.conf: |
      [FILTER]
          Name    rewrite_tag
          Match   kube.*

          Rule    $kubernetes['namespace_name'] ^mhc-dev$ dev.$TAG false
          Rule    $kubernetes['namespace_name'] ^mhc-preprod$ preprod.$TAG false
          Rule    $kubernetes['namespace_name'] ^mhc-prod$ prod.$TAG false
    output-dev.conf: |
      [OUTPUT]
          Name                es
          Match               dev.*
          Host                mhc-logging-master
          Port                9200
          HTTP_User           elastic
          HTTP_Passwd         Elastic@123
          tls                 On
          tls.verify          Off
          Logstash_Format     On
          Logstash_Prefix     mhc-dev
          Replace_Dots        On
          Suppress_Type_Name  On
          Retry_Limit         False
    output-preprod.conf: |
      [OUTPUT]
          Name                es
          Match               preprod.*
          Host                mhc-logging-master
          Port                9200
          HTTP_User           elastic
          HTTP_Passwd         Elastic@123
          tls                 On
          tls.verify          Off
          Logstash_Format     On
          Logstash_Prefix     mhc-preprod
          Replace_Dots        On
          Suppress_Type_Name  On
          Retry_Limit         False
    output-prod.conf: |
      [OUTPUT]
          Name                es
          Match               prod.*
          Host                mhc-logging-master
          Port                9200
          HTTP_User           elastic
          HTTP_Passwd         Elastic@123
          tls                 On
          tls.verify          Off
          Logstash_Format     On
          Logstash_Prefix     mhc-prod
          Replace_Dots        On
          Suppress_Type_Name  On
          Retry_Limit         False
    output-system.conf: |
      [OUTPUT]
          Name                es
          Match               kube.*
          Host                mhc-logging-master
          Port                9200
          HTTP_User           elastic
          HTTP_Passwd         Elastic@123
          tls                 On
          tls.verify          Off
          Logstash_Format     On
          Logstash_Prefix     mhc-system
          Replace_Dots        On
          Suppress_Type_Name  On
          Retry_Limit         False
  service: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        Off
        Parsers_File  parsers.conf
        Parsers_File custom_parsers.conf
      
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

        @INCLUDE inputs.conf
        @INCLUDE filters.conf
        @INCLUDE rewrite-tag.conf
        @INCLUDE output-dev.conf
        @INCLUDE output-preprod.conf
        @INCLUDE output-prod.conf
        @INCLUDE output-system.conf
  upstream: {}
daemonSetVolumeMounts:
- mountPath: /var/log
  name: varlog
- mountPath: /var/lib/docker/containers
  name: varlibdockercontainers
  readOnly: true
- mountPath: /etc/machine-id
  name: etcmachineid
  readOnly: true
daemonSetVolumes:
- hostPath:
    path: /var/log
  name: varlog
- hostPath:
    path: /var/lib/docker/containers
  name: varlibdockercontainers
- hostPath:
    path: /etc/machine-id
    type: File
  name: etcmachineid
