---
# Source: fluent-bit/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit
  namespace: default
  labels:
    helm.sh/chart: fluent-bit-0.57.9
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/instance: fluent-bit
    app.kubernetes.io/version: "5.0.9"
    app.kubernetes.io/managed-by: Helm
data:
  custom_parsers.conf: |
    [PARSER]
        Name docker_no_time
        Format json
        Time_Keep Off
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
    
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        Off
        Parsers_File  parsers.conf
        Parsers_File  custom_parsers.conf
    
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
    
        @INCLUDE inputs.conf
        @INCLUDE filters.conf
        @INCLUDE rewrite-tag.conf
        @INCLUDE output-dev.conf
        @INCLUDE output-preprod.conf
        @INCLUDE output-prod.conf
        @INCLUDE output-system.conf
    
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
    
    [INPUT]
        Name systemd
        Tag host.*
        Systemd_Filter _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail On
    
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
    
    [OUTPUT]
        Name es
        Match kube.*
        Host elasticsearch-master
        Logstash_Format On
        Retry_Limit False
    
    [OUTPUT]
        Name es
        Match host.*
        Host elasticsearch-master
        Logstash_Format On
        Logstash_Prefix node
        Retry_Limit False
    
  filters.conf: |
    [FILTER]
        Name                  kubernetes
        Match                 kube.*
        Kube_Tag_Prefix       kube.var.log.containers.
        Merge_Log             On
        Merge_Log_Key         log_processed
        Keep_Log              On
        K8S-Logging.Parser    On
        K8S-Logging.Exclude   Off
        Labels                On
        Annotations           On
    
  inputs.conf: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
    
  output-dev.conf: |
    [OUTPUT]
        Name                es
        Match               dev.*
        Host                mhc-logging-master
        Port                9200
        HTTP_User           elastic
        HTTP_Passwd         Elastic@123
        tls                 On
        tls.verify          Off
        Logstash_Format     On
        Logstash_Prefix     mhc-dev
        Replace_Dots        On
        Suppress_Type_Name  On
        Retry_Limit         False
    
  output-preprod.conf: |
    [OUTPUT]
        Name                es
        Match               preprod.*
        Host                mhc-logging-master
        Port                9200
        HTTP_User           elastic
        HTTP_Passwd         Elastic@123
        tls                 On
        tls.verify          Off
        Logstash_Format     On
        Logstash_Prefix     mhc-preprod
        Replace_Dots        On
        Suppress_Type_Name  On
        Retry_Limit         False
    
  output-prod.conf: |
    [OUTPUT]
        Name                es
        Match               prod.*
        Host                mhc-logging-master
        Port                9200
        HTTP_User           elastic
        HTTP_Passwd         Elastic@123
        tls                 On
        tls.verify          Off
        Logstash_Format     On
        Logstash_Prefix     mhc-prod
        Replace_Dots        On
        Suppress_Type_Name  On
        Retry_Limit         False
    
  output-system.conf: |
    [OUTPUT]
        Name                es
        Match               kube.*
        Host                mhc-logging-master
        Port                9200
        HTTP_User           elastic
        HTTP_Passwd         Elastic@123
        tls                 On
        tls.verify          Off
        Logstash_Format     On
        Logstash_Prefix     mhc-system
        Replace_Dots        On
        Suppress_Type_Name  On
        Retry_Limit         False
    
  rewrite-tag.conf: |
    [FILTER]
        Name    rewrite_tag
        Match   kube.*
    
        Rule    $kubernetes['namespace_name'] ^mhc-dev$ dev.$TAG false
        Rule    $kubernetes['namespace_name'] ^mhc-preprod$ preprod.$TAG false
        Rule    $kubernetes['namespace_name'] ^mhc-prod$ prod.$TAG false
